services:
  mongo:
    image: mongo:7
    container_name: fiismart-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: fiismart
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: